name: Supabase Keep Alive

on:
  schedule:
    # 매주 월요일과 목요일 자정(UTC)에 실행 (한국 시간 오전 9시)
    - cron: '0 0 * * 1,4'
  workflow_dispatch: # 수동으로 즉시 실행 가능하게 함

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Send API Request to Supabase
        run: |
          curl -i -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/submissions?limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"

<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>퍼펙트문해 로고송 공모전 접수</title>
    <meta name="description" content="퍼펙트문해 CM송 공모전에 참여하세요!" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #2563EB;
            --primary-light: #60A5FA;
            --primary-dark: #1E40AF;
            --accent: #0EA5E9;
            --bg-start: #F8FAFC;
            --bg-end: #F1F5F9;
            --card-bg: #FFFFFF;
            --card-border: rgba(37, 99, 235, 0.15);
            --card-selected-bg: #F0F7FF;
            --text-primary: #0F172A;
            --text-secondary: #475569;
            --text-muted: #94A3B8;
            --input-bg: #F8FAFC;
            --input-border: #CBD5E1;
            --input-focus: rgba(37, 99, 235, 0.15);
            --shadow-sm: 0 4px 12px rgba(15, 23, 42, 0.03);
            --shadow-md: 0 8px 24px rgba(15, 23, 42, 0.06);
            --shadow-lg: 0 16px 40px rgba(15, 23, 42, 0.1);
            --radius: 20px;
            --radius-sm: 14px;
            --radius-xs: 8px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(160deg, var(--bg-start) 0%, var(--bg-end) 100%);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        .app-container {
            max-width: 520px;
            margin: 0 auto;
            padding: 24px 20px;
            padding-bottom: 120px;
        }

        /* ── Hero Image ── */
        .hero-image {
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow-md);
            background: var(--bg-end);
            margin-bottom: 24px;
        }

        .hero-image img {
            width: 100%;
            height: 240px;
            object-fit: cover;
            object-position: center;
            display: block;
        }

        /* ── Header ── */
        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(37, 99, 235, 0.1);
            color: var(--primary);
            font-size: 12px;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 20px;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 800;
            color: var(--text-primary);
            line-height: 1.3;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* ── Form Layout ── */
        .form-section {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            padding: 28px 24px;
            box-shadow: var(--shadow-sm);
            margin-bottom: 24px;
        }

        .form-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--card-border);
        }

        .form-title svg {
            width: 20px;
            height: 20px;
            color: var(--primary);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .form-label span.req {
            color: #E74C3C;
            margin-left: 2px;
        }

        /* ── Inputs ── */
        .form-input,
        .form-textarea {
            width: 100%;
            background: var(--input-bg);
            border: 1.5px solid var(--input-border);
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            font-size: 15px;
            font-family: inherit;
            color: var(--text-primary);
            transition: all var(--transition);
            outline: none;
        }

        .form-input::placeholder,
        .form-textarea::placeholder {
            color: var(--text-muted);
        }

        .form-input:focus,
        .form-textarea:focus {
            background: #FFFFFF;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--input-focus);
        }

        .form-textarea {
            resize: vertical;
            min-height: 120px;
            line-height: 1.5;
        }

        /* ── Custom File Upload (Drag & Drop) ── */
        .file-dropzone {
            display: block;
            border: 2px dashed var(--input-border);
            border-radius: var(--radius-sm);
            background: var(--input-bg);
            padding: 32px 20px;
            text-align: center;
            transition: all var(--transition);
            cursor: pointer;
            position: relative;
        }

        .file-dropzone:hover {
            border-color: var(--primary-light);
            background: var(--card-selected-bg);
        }

        .file-dropzone.dragover {
            border-color: var(--primary);
            background: var(--input-focus);
        }

        .file-icon {
            width: 48px;
            height: 48px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            color: var(--primary);
            box-shadow: var(--shadow-sm);
            transition: transform var(--transition);
        }

        .file-dropzone:hover .file-icon {
            transform: translateY(-4px) scale(1.05);
            box-shadow: var(--shadow-md);
        }

        .file-text {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .file-hint {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .file-input-hidden {
            position: absolute;
            width: 0;
            height: 0;
            opacity: 0;
        }

        .file-list {
            margin-top: 12px;
            display: none;
            /* hidden when empty */
        }

        .file-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: white;
            border: 1px solid var(--primary-light);
            padding: 12px 16px;
            border-radius: var(--radius-xs);
            box-shadow: var(--shadow-sm);
        }

        .file-item-icon {
            color: var(--primary);
        }

        .file-item-name {
            flex: 1;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-item-remove {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
        }

        .file-item-remove:hover {
            color: #E74C3C;
        }

        /* ── Checkbox ── */
        .checkbox-wrap {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-top: 8px;
            cursor: pointer;
        }

        .checkbox-input {
            display: none;
        }

        .checkbox-box {
            width: 22px;
            height: 22px;
            border: 2px solid var(--input-border);
            border-radius: 6px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all var(--transition);
            margin-top: 2px;
        }

        .checkbox-input:checked+.checkbox-box {
            background: var(--primary);
            border-color: var(--primary);
        }

        .checkbox-box svg {
            width: 14px;
            height: 14px;
            color: white;
            opacity: 0;
            transform: scale(0.5);
            transition: all var(--transition);
        }

        .checkbox-input:checked+.checkbox-box svg {
            opacity: 1;
            transform: scale(1);
        }

        .checkbox-text {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .checkbox-text a {
            color: var(--primary);
            text-decoration: underline;
            font-weight: 500;
        }

        /* ── Bottom CTA Bar ── */
        .cta-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 16px 20px;
            padding-bottom: max(16px, env(safe-area-inset-bottom));
            background: linear-gradient(to top, rgba(241, 245, 249, 0.98) 60%, rgba(241, 245, 249, 0) 100%);
            display: flex;
            justify-content: center;
        }

        .submit-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            max-width: 480px;
            padding: 16px 24px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(37, 99, 235, 0.35);
            transition: all var(--transition);
            position: relative;
            overflow: hidden;
        }

        .submit-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.6s ease;
        }

        .submit-btn:hover::after {
            left: 100%;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(37, 99, 235, 0.45);
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .submit-btn.loading {
            opacity: 0.8;
            pointer-events: none;
        }

        .nav-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 12px 20px;
            background: white;
            border: 1px solid var(--card-border);
            border-radius: 12px;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            margin-top: 16px;
            box-shadow: var(--shadow-sm);
            transition: all var(--transition);
            width: 100%;
        }

        .nav-btn:hover {
            background: var(--input-bg);
            color: var(--primary);
        }

        /* ── Toast ── */
        .toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: var(--text-primary);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            z-index: 400;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ── Confetti ── */
        @keyframes confetti-fall {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(60vh) rotate(720deg);
                opacity: 0;
            }
        }

        .confetti {
            position: fixed;
            top: -10px;
            width: 10px;
            height: 10px;
            z-index: 500;
            pointer-events: none;
            border-radius: 2px;
        }
    </style>
</head>

<body>

    <div class="app-container">

        <div class="hero-image">
            <img src="img/top.png" alt="퍼펙트문해 캐릭터 코지 이미지">
        </div>

        <header class="header">
            <div class="header-badge">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
                </svg>
                CONTEST
            </div>
            <h1>퍼펙트 문해 로고송 접수</h1>
            <p>세상에 하나뿐인 CM송을 들려주세요!<br>심사를 거쳐 팀장님 협찬 특별 선물을 드립니다.<br><span style="color: var(--primary); font-weight: 700;">[참여 일정] 4월 22일(수) ~ 4월 28일(화)</span></p>
        </header>

        <form id="registerForm">
            <!-- Section 1: 참가자 정보 -->
            <div class="form-section">
                <div class="form-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    참가자 정보
                </div>

                <div class="form-group">
                    <label class="form-label" for="userName">이름 <span class="req">*</span></label>
                    <input type="text" id="userName" name="userName" class="form-input" placeholder="이름을 입력해주세요"
                        required>
                </div>


            </div>

            <!-- Section 2: 음원 정보 -->
            <div class="form-section">
                <div class="form-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M9 18V5l12-2v13"></path>
                        <circle cx="6" cy="18" r="3"></circle>
                        <circle cx="18" cy="16" r="3"></circle>
                    </svg>
                    음원 정보
                </div>

                <div class="form-group">
                    <label class="form-label" for="songTitle">곡 제목 <span class="req">*</span></label>
                    <input type="text" id="songTitle" name="songTitle" class="form-input" placeholder="퍼펙트하게 배우는 문해력"
                        required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="songFile">음원 파일 첨부 <span class="req">*</span></label>

                    <label class="file-dropzone" id="dropzone" for="songFile">
                        <div class="file-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                                stroke-linecap="round" stroke-linejoin="round" width="24" height="24">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="17 8 12 3 7 8"></polyline>
                                <line x1="12" y1="3" x2="12" y2="15"></line>
                            </svg>
                        </div>
                        <div class="file-text">이곳을 클릭하거나 파일을 드래그하세요</div>
                        <div class="file-hint">지원 포맷: MP3, WAV (최대 10MB)</div>
                        <input type="file" id="songFile" name="songFile" class="file-input-hidden" accept="audio/*">
                    </label>

                    <div class="file-list" id="fileList">
                        <div class="file-item">
                            <svg class="file-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" width="20" height="20">
                                <path d="M9 18V5l12-2v13"></path>
                                <circle cx="6" cy="18" r="3"></circle>
                                <circle cx="18" cy="16" r="3"></circle>
                            </svg>
                            <div class="file-item-name" id="fileName">mysong.mp3</div>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="songDesc">가사</label>
                    <textarea id="songDesc" name="songDesc" class="form-textarea" placeholder="가사를 적어주세요!"></textarea>
                </div>
            </div>

            <!-- Section 3: 동의 -->
            <div class="form-group" style="margin-bottom: 30px;">
                <label class="checkbox-wrap">
                    <input type="checkbox" id="agreePolicy" class="checkbox-input" required>
                    <span class="checkbox-box">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                            stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                    </span>
                    <span class="checkbox-text">
                        본인은 공모전 참가와 관련된 <a href="#">개인정보 수집 및 이용</a>에 동의합니다. <span class="req">*</span>
                    </span>
                </label>
            </div>
        </form>
    </div>

    <div class="cta-bar">
        <button type="button" class="submit-btn" id="submitBtn">
            접수 완료하기
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                stroke-linejoin="round" width="18" height="18">
                <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
        </button>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ── Supabase 초기화 ──
        let supabaseClient = null;
        try {
            supabaseClient = supabase.createClient(
                'https://biibtfdpchcdlpfimimh.supabase.co',
                'sb_publishable_yDCKYS2CXf3-WGzgpJ_pQA_pTF_p68p',
                {
                    auth: {
                        persistSession: false,
                        detectSessionInUrl: false
                    }
                }
            );
        } catch (e) {
            console.warn('Supabase init warn:', e);
        }

        // ── 공통 유틸 ──
        function showToast(msg) {
            const toast = document.getElementById('toast');
            if (toast) {
                toast.textContent = msg;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 3000);
            }
        }

        function launchConfetti() {
            const colors = ['#C57B43', '#E09A65', '#E8A869', '#F2D2A9', '#FFFDF9'];
            for (let i = 0; i < 60; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + 'vw';
                c.style.background = colors[Math.floor(Math.random() * colors.length)];
                c.style.width = (Math.random() * 8 + 6) + 'px';
                c.style.height = (Math.random() * 8 + 6) + 'px';
                c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                c.style.animation = `confetti-fall ${Math.random() * 2 + 1.5}s ease-out forwards`;
                c.style.animationDelay = Math.random() * 0.5 + 's';
                document.body.appendChild(c);
                setTimeout(() => c.remove(), 4000);
            }
        }

        // ── 파일 첨부 UI ──
        let selectedFile = null;
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('songFile');
        const fileList = document.getElementById('fileList');
        const fileNameDisplay = document.getElementById('fileName');
        const removeBtn = document.getElementById('removeFileCb');

        function handleFiles(files) {
            if (!files || files.length === 0) return;
            const file = files[0];
            const ext = file.name.split('.').pop().toLowerCase();
            const validExts = ['mp3', 'wav', 'm4a', 'flac', 'aac', 'ogg'];
            if (!file.type.startsWith('audio/') && !validExts.includes(ext)) {
                showToast('오디오 파일(.mp3, .wav 등)만 업로드 가능합니다.');
                return;
            }
            selectedFile = file;
            if (fileNameDisplay) fileNameDisplay.textContent = file.name;
            if (dropzone) dropzone.style.display = 'none';
            if (fileList) fileList.style.display = 'flex';
        }

        if (dropzone) {
            dropzone.addEventListener('dragenter', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
            dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
            dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
            dropzone.addEventListener('drop', e => {
                e.preventDefault();
                dropzone.classList.remove('dragover');
                handleFiles(e.dataTransfer.files);
            });
        }

        if (fileInput) {
            fileInput.addEventListener('change', e => handleFiles(e.target.files));
        }

        if (removeBtn) {
            removeBtn.addEventListener('click', () => {
                selectedFile = null;
                if (fileInput) fileInput.value = '';
                if (dropzone) dropzone.style.display = 'block';
                if (fileList) fileList.style.display = 'none';
            });
        }

        // ── 접수 완료 버튼 ──
        const submitBtn = document.getElementById('submitBtn');
        if (submitBtn) {
            submitBtn.addEventListener('click', async () => {
                const userNameField = document.getElementById('userName');
                const songTitleField = document.getElementById('songTitle');
                const agreePolicyField = document.getElementById('agreePolicy');

                const userName = userNameField ? userNameField.value.trim() : "";
                const songTitle = songTitleField ? songTitleField.value.trim() : "";
                const agreed = agreePolicyField ? agreePolicyField.checked : false;

                if (!userName) {
                    showToast('이름을 입력해주세요.');
                    userNameField.focus();
                    return;
                }
                if (!songTitle) {
                    showToast('곡 제목을 입력해주세요.');
                    songTitleField.focus();
                    return;
                }
                if (!selectedFile) {
                    showToast('음원 파일을 첨부해주세요!');
                    return;
                }
                if (!agreed) {
                    showToast('개인정보 수집 및 이용에 동의해야 합니다.');
                    return;
                }

                submitBtn.disabled = true;
                const originalHTML = submitBtn.innerHTML;
                submitBtn.innerHTML = `업로드 중... <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18" style="animation:spin 1s linear infinite"><circle cx="12" cy="12" r="10" stroke-dasharray="32" stroke-dashoffset="10"/></svg>`;

                if (!document.getElementById('spinnerCss')) {
                    const s = document.createElement('style');
                    s.id = 'spinnerCss';
                    s.textContent = '@keyframes spin { 100%{ transform:rotate(360deg); } }';
                    document.head.appendChild(s);
                }

                try {
                    if (!supabaseClient) throw new Error('서버 연결 시패. 새로고침 후 다시 시도해주세요.');

                    const songDescField = document.getElementById('songDesc');
                    const songDesc = songDescField ? songDescField.value : "";
                    const ext = selectedFile.name.split('.').pop();
                    const path = `${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;

                    const { error: uploadErr } = await supabaseClient.storage.from('songs').upload(path, selectedFile);
                    if (uploadErr) throw uploadErr;

                    const { data: urlData } = supabaseClient.storage.from('songs').getPublicUrl(path);
                    const publicUrl = urlData.publicUrl;

                    const { error: dbErr } = await supabaseClient.from('submissions').insert([{
                        user_name: userName,
                        song_title: songTitle,
                        song_desc: songDesc,
                        audio_url: publicUrl
                    }]);
                    if (dbErr) throw dbErr;

                    submitBtn.classList.add('success');
                    submitBtn.innerHTML = '✅ 접수 완료!';
                    launchConfetti();
                    alert('투표가 완료되었습니다');

                } catch (err) {
                    console.error(err);
                    showToast('❌ ' + (err.message || '오류가 발생했습니다.'));
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = originalHTML;
                }
            });
        }
    </script>
</body>

</html>

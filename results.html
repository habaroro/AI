<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>퍼펙트문해 투표 결과</title>
    <meta name="description" content="퍼펙트문해 CM송 투표 결과를 확인하세요!">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563EB;
            --primary-light: #60A5FA;
            --primary-dark: #1E40AF;
            --accent: #0EA5E9;
            --bg-start: #F8FAFC;
            --bg-end: #F1F5F9;
            --card-bg: #FFFFFF;
            --card-border: rgba(37, 99, 235, 0.1);
            --text-primary: #0F172A;
            --text-secondary: #475569;
            --text-muted: #94A3B8;
            --shadow-md: 0 8px 32px rgba(15, 23, 42, 0.06);
            --shadow-lg: 0 16px 48px rgba(15, 23, 42, 0.08);
            --radius: 20px;
            --radius-sm: 14px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(160deg, var(--bg-start) 0%, var(--bg-end) 100%);
            min-height: 100vh;
            color: var(--text-primary);
            padding-bottom: 40px;
        }

        .app-container {
            max-width: 520px;
            margin: 0 auto;
            padding: 24px 20px;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 32px;
            padding-top: 20px;
            animation: fadeUp 0.5s ease both;
        }

        .header-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(37, 99, 235, 0.1);
            color: var(--primary);
            font-size: 12px;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 20px;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .header-badge svg { width: 14px; height: 14px; }

        h1 {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .subtitle { font-size: 14px; color: var(--text-secondary); line-height: 1.5; }

        /* Section Title */
        .section-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text-primary);
        }

        .section-title .icon {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            background: rgba(37, 99, 235, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        /* Summary Cards */
        .summary-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 28px;
            animation: fadeUp 0.5s ease 0.1s both;
        }

        .summary-card.full-width {
            grid-column: 1 / -1;
        }

        .summary-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-sm);
            padding: 20px 16px;
            text-align: center;
            box-shadow: var(--shadow-md);
        }

        .summary-card .label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .summary-card .value {
            font-size: 28px;
            font-weight: 800;
            color: var(--primary);
        }

        .summary-card .value small {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
        }

        /* Result Section */
        .result-section {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            padding: 24px 20px;
            box-shadow: var(--shadow-md);
            margin-bottom: 20px;
            animation: fadeUp 0.5s ease both;
        }

        .result-section:nth-child(1) { animation-delay: 0.15s; }
        .result-section:nth-child(2) { animation-delay: 0.25s; }

        /* Result Item */
        .result-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 0;
            border-bottom: 1px solid rgba(0,0,0,0.04);
        }

        .result-item:last-child { border-bottom: none; }

        .result-rank {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 800;
            flex-shrink: 0;
            background: rgba(37, 99, 235, 0.08);
            color: var(--primary);
        }

        .result-item:nth-child(1) .result-rank {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: white;
            box-shadow: 0 2px 8px rgba(255, 165, 0, 0.3);
        }

        .result-item:nth-child(2) .result-rank {
            background: linear-gradient(135deg, #C0C0C0, #A0A0A0);
            color: white;
        }

        .result-item:nth-child(3) .result-rank {
            background: linear-gradient(135deg, #CD7F32, #A0522D);
            color: white;
        }

        .result-body { flex: 1; min-width: 0; }

        .result-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .result-bar-wrap {
            width: 100%;
            height: 8px;
            background: rgba(37, 99, 235, 0.06);
            border-radius: 4px;
            overflow: hidden;
        }

        .result-bar {
            height: 100%;
            border-radius: 4px;
            width: 0%;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .result-votes {
            font-size: 14px;
            font-weight: 800;
            color: var(--primary);
            flex-shrink: 0;
            min-width: 44px;
            text-align: right;
        }

        .result-votes small {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
        }

        /* Crown for 1st */
        .result-item:first-child .result-name::before {
            content: '👑 ';
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 32px 16px;
            color: var(--text-muted);
            font-size: 14px;
        }

        .empty-state .icon { font-size: 36px; margin-bottom: 12px; }

        /* Refresh Button */
        .refresh-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.25);
            transition: all var(--transition);
            margin-top: 8px;
            font-family: inherit;
        }

        .refresh-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(37, 99, 235, 0.35); }
        .refresh-btn:active { transform: scale(0.98); }
        .refresh-btn svg { width: 18px; height: 18px; }

        .reset-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            padding: 12px;
            background: #FFF1F2;
            color: #E11D48;
            border: 1px solid #FECDD3;
            border-radius: 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            margin-top: 12px;
            opacity: 0.8;
        }

        .reset-btn:hover { background: #FFE4E6; opacity: 1; transform: translateY(-1px); }
        .reset-btn svg { width: 14px; height: 14px; }

        /* Back Link */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 500;
            text-decoration: none;
            margin-top: 20px;
            transition: color var(--transition);
        }

        .back-link:hover { color: var(--primary); }
        .back-link svg { width: 16px; height: 16px; }

        /* Loading Spinner */
        .loading-spinner {
            width: 36px; height: 36px;
            border: 3px solid rgba(37, 99, 235, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 24px 0 8px;
            color: var(--text-muted);
            font-size: 12px;
            animation: fadeUp 0.5s ease 0.35s both;
        }

        @media (max-width: 480px) {
            .app-container { padding: 16px; }
            h1 { font-size: 20px; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div class="header-badge">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 20V10"/>
                    <path d="M12 20V4"/>
                    <path d="M6 20v-6"/>
                </svg>
                RESULTS
            </div>
            <h1>투표 결과</h1>
            <p class="subtitle">실시간 투표 현황을 확인해보세요</p>
        </header>

        <!-- Summary -->
        <div class="summary-row">
            <div class="summary-card">
                <div class="label">총 투표 수</div>
                <div class="value" id="totalSubmission">0<small>표</small></div>
            </div>
            <div class="summary-card">
                <div class="label">총 후보 곡</div>
                <div class="value" id="totalSongs">0<small>곡</small></div>
            </div>
        </div>

        <!-- Submission Results -->
        <div id="submissionSection"></div>

        <!-- Refresh -->
        <button class="refresh-btn" onclick="loadAll()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10"/>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
            새로고침
        </button>
        
        <button class="reset-btn" onclick="resetVotes()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
            </svg>
            모든 투표 데이터 초기화
        </button>

        <div style="text-align:center; margin-top: 20px;">
            <a href="vote_list.html" class="back-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
                투표 페이지로 돌아가기
            </a>
        </div>

        <div class="footer">
            <p>© 2026 Perfect Literacy. All rights reserved.</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Supabase for submission titles
        const SUPABASE_URL = 'https://biibtfdpchcdlpfimimh.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_yDCKYS2CXf3-WGzgpJ_pQA_pTF_p68p';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
            auth: { persistSession: false, detectSessionInUrl: false }
        });

        const defaultColors = ['#2563EB','#0EA5E9','#8B5CF6','#EC4899','#10B981','#F59E0B','#EF4444','#6366F1'];

        function loadAll() {
            renderSubmissionResults();
        }

        /* ── Submission Results ── */
        async function renderSubmissionResults() {
            const votes = JSON.parse(localStorage.getItem('submissionVotes') || '{}');
            const section = document.getElementById('submissionSection');

            // Fetch all submissions from Supabase
            let submissions = [];
            try {
                const { data } = await supabaseClient.from('submissions').select('id, song_title');
                if (data) submissions = data;
            } catch (e) { /* fallback */ }

            // Total counts
            const total = Object.values(votes).reduce((s, v) => s + v, 0);
            document.getElementById('totalSubmission').innerHTML = total + '<small>표</small>';
            document.getElementById('totalSongs').innerHTML = submissions.length + '<small>곡</small>';

            // Build items from all submissions (include 0-vote songs too)
            const items = submissions.map((s, idx) => ({
                name: s.song_title,
                count: votes[s.id] || 0,
                color: defaultColors[idx % defaultColors.length]
            }));
            items.sort((a, b) => b.count - a.count);

            section.innerHTML = '';
            const card = buildSection('🏆 공모전 투표', items);
            section.appendChild(card);
        }

        /* ── Build Section Card ── */
        function buildSection(title, items) {
            const div = document.createElement('div');
            div.className = 'result-section';

            let html = `<div class="section-title"><div class="icon">${title.charAt(0)}</div>${title}</div>`;

            if (items.length === 0 || items.every(i => i.count === 0)) {
                html += `<div class="empty-state"><div class="icon">📭</div><p>아직 투표 결과가 없습니다</p></div>`;
            } else {
                const maxCount = Math.max(...items.map(i => i.count), 1);
                items.forEach((item, idx) => {
                    const pct = (item.count / maxCount) * 100;
                    html += `
                    <div class="result-item">
                        <div class="result-rank">${idx + 1}</div>
                        <div class="result-body">
                            <div class="result-name">${item.name}</div>
                            <div class="result-bar-wrap">
                                <div class="result-bar" data-width="${Math.max(pct, 4)}" style="background: linear-gradient(90deg, ${item.color}, ${item.color}88);"></div>
                            </div>
                        </div>
                        <div class="result-votes">${item.count}<small>표</small></div>
                    </div>`;
                });
            }

            div.innerHTML = html;

            // Animate bars
            requestAnimationFrame(() => {
                setTimeout(() => {
                    div.querySelectorAll('.result-bar').forEach(bar => {
                        bar.style.width = bar.dataset.width + '%';
                    });
                }, 100);
            });

            return div;
        }

        function resetVotes() {
            if (!confirm('정말로 모든 투표 데이터를 초기화하시겠습니까?\n이 작업은 되돌릴 수 없으며 현재 브라우저에 저장된 모든 투표수가 삭제됩니다.')) {
                return;
            }
            
            localStorage.removeItem('submissionVotes');
            localStorage.removeItem('hasVotedSubmissions');
            
            alert('초기화가 완료되었습니다.');
            loadAll();
        }

        // Init
        loadAll();
    </script>
</body>
</html>
